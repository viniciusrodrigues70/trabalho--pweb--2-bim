<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaTicket PRO | Bilheteria</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">🎟️ SalaTicket <span>PRO</span></div>
        <nav>
            <a href="index.html">Em Cartaz</a>
            <a href="salas.html">Gerenciar Salas</a>
            <a href="usuarios.html">Usuários</a>
            <a href="reservas.html" class="active">Reservas</a>
            <a href="relatorios.html">Dash</a>
        </nav>
    </header>

    <main>
        <div class="panel" style="margin-bottom: 40px; background: linear-gradient(135deg, var(--bg-card) 0%, #152238 100%);">
            <h3>🔍 Consultar Grade de Horários Livres (GET Disponibilidade)</h3>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="flex: 2; min-width: 250px;">
                    <label>ID da Sala</label>
                    <input type="text" id="disp-sala-id">
                </div>
                <div class="form-group" style="flex: 1; min-width: 180px;">
                    <label>Data</label>
                    <input type="date" id="disp-data-alvo">
                </div>
                <button class="btn btn-gold" id="btn-consultar-disponibilidade" style="height: 45px;">Ver Horários</button>
            </div>
            <div id="wrapper-resposta-disponibilidade" style="margin-top: 20px; font-weight: 600; color: var(--cyan);"></div>
        </div>

        <div class="split-layout">
            <div class="panel">
                <h3>Emitir Bilhete (POST)</h3><br>
                <form id="form-comprar-reserva">
                    <div class="form-group" style="margin-bottom: 18px;">
                        <label>ID da Sala</label>
                        <input type="text" id="res-sala-id" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 18px;">
                        <label>ID do Usuário</label>
                        <input type="text" id="res-user-id" value="user-admin" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 18px;">
                        <label>Início</label>
                        <input type="datetime-local" id="res-inicio" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label>Término</label>
                        <input type="datetime-local" id="res-fim" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Efetivar Reserva</button>
                </form>
            </div>

            <div>
                <div class="panel" style="margin-bottom: 25px; padding: 20px;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="filtro-res-sala" placeholder="Filtrar por Sala ID">
                        <button class="btn btn-gold" id="btn-filtrar-res">Filtrar Reservas</button>
                    </div>
                </div>
                <div class="data-table-container" id="lista-reservas-central"></div>
            </div>
        </div>
    </main>
    <script src="js/reservas.js"></script>
</body>
</html>
