<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaTicket PRO | Gerenciar Salas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">🎟️ SalaTicket <span>PRO</span></div>
        <nav>
            <a href="index.html">Em Cartaz</a>
            <a href="salas.html" class="active">Gerenciar Salas</a>
            <a href="usuarios.html">Usuários</a>
            <a href="reservas.html">Reservas</a>
            <a href="relatorios.html">Dash</a>
        </nav>
    </header>

    <main>
        <div class="section-header">
            <h2>Painel Estrutural de Salas (CRUD)</h2>
        </div>

        <div class="split-layout">
            <div class="panel">
                <h3 id="form-titulo">Cadastrar Nova Sala (POST)</h3>
                <form id="form-crud-sala">
                    <input type="hidden" id="sala-id-controle">
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="nome-sala">Nome de Identificação</label>
                        <input type="text" id="nome-sala" placeholder="Ex: Sala IMAX Premium" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="capacidade-sala">Capacidade de Assentos</label>
                        <input type="number" id="capacidade-sala" placeholder="Ex: 150" min="1" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label for="recursos-sala">Recursos (Separados por Vírgula)</label>
                        <input type="text" id="recursos-sala" placeholder="Projetor 4K, Ar-condicionado">
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" id="btn-submit-sala" style="flex: 1;">Salvar</button>
                        <button type="button" class="btn btn-danger" id="btn-cancelar-edicao" style="display: none;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div>
                <div class="data-table-container" id="lista-controle-salas">
                    </div>
            </div>
        </div>
    </main>

    <script src="js/salas.js"></script>
</body>
</html>
