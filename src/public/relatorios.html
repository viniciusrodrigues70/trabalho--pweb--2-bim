<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaTicket PRO | Dash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">🎟️ SalaTicket <span>PRO</span></div>
        <nav>
            <a href="index.html">Em Cartaz</a>
            <a href="salas.html">Gerenciar Salas</a>
            <a href="usuarios.html">Usuários</a>
            <a href="reservas.html">Reservas</a>
            <a href="relatorios.html" class="active">Dash</a>
        </nav>
    </header>

    <main>
        <div class="section-header"><h2>Indicadores</h2></div>

        <div class="metrics-grid">
            <div class="metric-card">
                <label>Horário de Pico</label>
                <div class="metric-val" id="metric-pico">--:--</div>
            </div>
            <div class="metric-card">
                <label>Status</label>
                <div class="metric-val" style="color: #22c55e;">Ativo</div>
            </div>
        </div>

        <div class="section-header"><h3>Ocupação por Sala</h3></div>
        <div class="data-table-container" id="container-ocupacao-salas"></div>
    </main>
    <script src="js/relatorios.js"></script>
</body>
</html>
