<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaTicket PRO | Usuários</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">🎟️ SalaTicket <span>PRO</span></div>
        <nav>
            <a href="index.html">Em Cartaz</a>
            <a href="salas.html">Gerenciar Salas</a>
            <a href="usuarios.html" class="active">Usuários</a>
            <a href="reservas.html">Reservas</a>
            <a href="relatorios.html">Dash</a>
        </nav>
    </header>

    <main>
        <div class="section-header">
            <h2>Módulo de Clientes & Usuários</h2>
        </div>

        <div class="split-layout">
            <div class="panel">
                <h3>Cadastrar Novo Usuário (POST)</h3>
                <form id="form-cadastro-usuario">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Nome Completo</label>
                        <input type="text" id="nome-user" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>E-mail</label>
                        <input type="email" id="email-user" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label>Departamento</label>
                        <input type="text" id="depto-user" required>
                    </div>
                    <button type="submit" class="btn btn-gold" style="width:100%;">Registrar Perfil</button>
                </form>
            </div>

            <div>
                <div class="panel" style="margin-bottom: 30px;">
                    <h3>Buscar Reservas Vinculadas a um ID (GET)</h3>
                    <div style="display: flex; gap: 15px;">
                        <input type="text" id="input-busca-user-id" placeholder="Ex: user-admin">
                        <button class="btn" id="btn-buscar-reservas-user">Buscar</button>
                    </div>
                </div>

                <div class="data-table-container" id="container-historico-usuario">
                    <div style="padding: 30px; text-align:center;">Insira um ID para pesquisar.</div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/usuarios.js"></script>
</body>
</html>
